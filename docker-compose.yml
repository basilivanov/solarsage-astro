# AI_HEADER
# module: M-DEPLOY-ORCHESTRATION
# wave: W-DEPLOY
# purpose: CANONICAL Docker Compose — source of truth for port assignments.
#
# PORT MAP (host → container):
#   8000 → API (FastAPI)
#   8001 → SolarSage sidecar (astrological calculation engine)
#   3000 → Frontend (Next.js)
#   5432 → PostgreSQL
#
# This is the NAMED (non-namespaced) compose file.
# If you need to run alongside other projects on the same host,
# use docker-compose.prod.yml which maps to namespaced ports
# (8002, 8003, 5434) to avoid conflicts.

version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: astro
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://astro:${DB_PASSWORD}@db:5432/astro
      APP_ENV: production
      APP_DOMAIN: ${APP_DOMAIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  solarsage:
    build:
      context: ./apps/solarsage
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    command: uvicorn solarsage.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: https://${APP_DOMAIN}/api

volumes:
  postgres_data:
