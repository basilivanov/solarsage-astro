# AI_HEADER
# module: M-DEPLOY-ORCHESTRATION
# wave: W-DEPLOY
# purpose: Docker Compose orchestration for production deployment

version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: astro
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://astro:${DB_PASSWORD}@db:5432/astro
      APP_ENV: production
      APP_DOMAIN: ${APP_DOMAIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # SolarSage sidecar
  solarsage:
    build:
      context: ./apps/solarsage
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    command: uvicorn solarsage.main:app --host 0.0.0.0 --port 8001

  # Frontend (Vite build)
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: https://${APP_DOMAIN}/api

volumes:
  postgres_data:
