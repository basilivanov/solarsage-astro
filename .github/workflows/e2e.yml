name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: astro
          POSTGRES_PASSWORD: astro_test_password
          POSTGRES_DB: astro
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://astro:astro_test_password@localhost:5432/astro
        run: |
          cd apps/api
          alembic upgrade head

      - name: Start FastAPI backend
        env:
          DATABASE_URL: postgresql+asyncpg://astro:astro_test_password@localhost:5432/astro
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
          JWT_SECRET: test-secret
          GRACE_USER_SALT: test-salt-32-bytes-minimum-change
        run: |
          cd apps/api
          uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          curl -f http://localhost:8001/api/health || exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run E2E tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          CI: true
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'test-results/results.json';

            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const { stats } = results;

              const body = `## E2E Test Results

              - ✅ Passed: ${stats.expected}
              - ❌ Failed: ${stats.unexpected}
              - ⏭️ Skipped: ${stats.skipped}
              - ⏱️ Duration: ${(stats.duration / 1000).toFixed(2)}s

              [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
