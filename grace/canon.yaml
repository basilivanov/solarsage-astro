# GRACE canon adoption policy for Solar Sage
#
# Slices describe ownership/write-scope for GRACE. They do not imply runtime
# folder moves. Runtime structure changes require explicit business/product scope.

gate_mode: changed-files

# Included path globs (empty = all non-excluded paths)
include: []

# Excluded path globs (generated/vendor/framework artifacts)
exclude:
  - "node_modules/**"
  - ".next/**"
  - ".venv/**"
  - "__pycache__/**"
  - "alembic/**"
  - "migrations/**"
  - "components/ui/**/*.tsx"
  - "components/ui/**/*.ts"
  - "**/*.min.js"
  - "**/*.min.css"
  - "package-lock.json"
  - "pnpm-lock.yaml"

# Staged adoption — these are the first slices to bring under full GRACE canon.
# Do not mass-apply markers across unrelated slices in one packet.
adopt_first:
  # P0: business-feature critical frontend surface
  - "components/today/"
  - "components/calendar/"
  - "app/(grace)/today/"
  - "lib/today.ts"
  - "lib/calendar.ts"
  - "components/app-shell.tsx"
  - "components/today/tab-bar.tsx"

  # P0: backend API/service ownership
  - "apps/api/app/api/"
  - "apps/api/app/services/"
  - "apps/api/app/core/"

  # P0: contracts
  - "apps/api/app/schemas/"
  - "scripts/contracts/"
  - "packages/contracts/"

  # P1: logging spine and audit detector
  - "lib/grace/"
  - "scripts/grace/coverage_audit.py"

# Slice registry source of truth.
slice_registry: "grace/knowledge-graph.xml"
coverage_audit: "docs/work/solarsage_grace_slice_coverage.json"
coverage_check: "python3 scripts/grace/coverage_audit.py --check"
